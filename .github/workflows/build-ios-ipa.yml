name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app for iPhoneOS (unsigned)
        run: |
          xcodebuild \
            -project BrudilnikIOS.xcodeproj \
            -scheme BrudilnikIOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/BrudilnikIOS.app build/Payload/
          cd build
          /usr/bin/zip -r BrudilnikIOS.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrudilnikIOS-ipa
          path: build/BrudilnikIOS.ipa
